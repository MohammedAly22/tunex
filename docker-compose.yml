version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - TUNEX_LLM_PROVIDER=${TUNEX_LLM_PROVIDER:-anthropic}
      - TUNEX_LLM_MODEL=${TUNEX_LLM_MODEL:-claude-sonnet-4-6}
      - TUNEX_ANTHROPIC_API_KEY=${TUNEX_ANTHROPIC_API_KEY:-}
      - TUNEX_OPENAI_API_KEY=${TUNEX_OPENAI_API_KEY:-}
      - TUNEX_COHERE_API_KEY=${TUNEX_COHERE_API_KEY:-}
      - TUNEX_OLLAMA_ENDPOINT=${TUNEX_OLLAMA_ENDPOINT:-http://host.docker.internal:11434}
      - TUNEX_HF_TOKEN=${TUNEX_HF_TOKEN:-}
    volumes:
      - ./outputs:/app/outputs
      - ./cache:/app/cache
    restart: unless-stopped
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
